<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#070a12"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" x2="1">
      <stop offset="0" stop-color="#22d3ee" stop-opacity=".9"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity=".9"/>
    </linearGradient>
    <filter id="blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="320" cy="260" r="220" fill="#22d3ee" opacity=".18" filter="url(#blur)"/>
  <circle cx="1220" cy="240" r="260" fill="#a855f7" opacity=".16" filter="url(#blur)"/>
  <circle cx="980" cy="820" r="320" fill="#34d399" opacity=".10" filter="url(#blur)"/>
  <g opacity=".85">
    <rect x="210" y="260" width="1180" height="560" rx="36" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.14)" stroke-width="2"/>
    <rect x="250" y="300" width="1100" height="210" rx="28" fill="rgba(255,255,255,.04)"/>
    <rect x="250" y="530" width="540" height="260" rx="28" fill="rgba(255,255,255,.04)"/>
    <rect x="810" y="530" width="540" height="260" rx="28" fill="rgba(255,255,255,.04)"/>
    <rect x="300" y="355" width="1000" height="110" rx="22" fill="#0b1020" opacity=".65"/>
    <rect x="320" y="372" width="320" height="76" rx="16" fill="#1f2937" opacity=".55"/>
    <rect x="664" y="372" width="636" height="76" rx="16" fill="#111827" opacity=".35"/>
    <text x="820" y="430" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="86" font-weight="800" letter-spacing="8" fill="#22c55e">KIWI</text>
    <text x="820" y="485" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="22" font-weight="700" letter-spacing="6" fill="rgba(255,255,255,.6)">STORHAMAR</text>
    <rect x="520" y="585" width="560" height="180" rx="28" fill="url(#glow)" opacity=".22"/>
    <text x="800" y="690" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="28" font-weight="700" fill="rgba(255,255,255,.85)">Лучший магазин для отдыха</text>
  </g>
</svg>

